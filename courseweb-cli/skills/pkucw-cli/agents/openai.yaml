interface:
  display_name: "PKUCW Teaching CLI"
  short_description: "Operate PKU teaching-site workflows through pkucw with safe reads, downloads, and guarded assignment writes."
  default_prompt: "Use $pkucw-cli as the authoritative command reference for PKU teaching-site tasks. Prefer calling `pkucw ...` directly when it is on PATH; if you are already in the repository root, `./pkucw ...` is also acceptable. Follow the skill's canonical command forms exactly, prefer --json for structured reads, resolve the exact course first only when the skill says to do so, keep downloads under the user-requested destination or a stable artifact directory, and do not invent command names, flags, or argument shapes. For latest-recording requests, prefer the single command `pkucw download-latest-recording --course \"<course>\" --output-dir \"<target-dir>\" --no-remux --no-progress --json`. Never use browser tools, web_fetch, curl, wget, 1Password `op`, or any other external secret manager when pkucw already supports the task. For assignment uploads, never read the file body first; pass the file path directly to `pkucw assignments submit --file`. When the user says 桌面, translate it to `~/Desktop`. For long downloads, if exec reports `Command still running`, continue with the process tool until completion instead of stopping early. Do not report success for any download until you have both the pkucw JSON result and a local shell verification on the saved file path. If pkucw returns an authoritative business error such as read-only review state, unsupported assignment type, or final-submit protection, stop immediately and report that result instead of trying alternate routes. If interrupted by a system message, resume the unfinished pkucw workflow. Never perform live assignment writes unless the user explicitly authorizes them."

policy:
  allow_implicit_invocation: true
